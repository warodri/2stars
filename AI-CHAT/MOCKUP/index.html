<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI - Chat</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</head>
<body style="padding:0; margin:0;">

    <div class="position-absolute bg-dark text-light" style="width:100vw; height: 100vh;">

        <div id="left-panel" style="background-color: red; width: 20vw;" class="h-100">
            <div class="p-2">
                <div id="left-pannel"></div>
            </div>
        </div>

        <div id="top-panel" style="background-color: green; height: 10vh; left: 20vw; top:0; width: calc(100vw - 40vw);" class="position-absolute">
            <div class="p-2">
                <div id="top-pannel"></div>
            </div>
        </div>

        <div id="top-panel" style="background-color: gray; height: calc(100vh - 10vh - 10vh); left: 20vw; top:10vh; overflow-y: auto; width: calc(100vw - 40vw);" class="position-absolute">
            <div class="p-2">
                <!--
                    Center panel
                    - Add  a text at the center explaining some commands that can be sent
                -->
                <div id="message-list"></div>
            </div>
        </div>

        <div id="input-panel" style="background-color: green; height: 10vh; left: 20vw; bottom:0; width: calc(100vw - 40vw);" class="position-absolute">
            <div class="p-2">
                <!-- 
                    Text input panel 
                    - Add an input chat text with a button to send the text 
                -->
                <div class="d-flex justify-content-between">
                    <input type="text" class="form-control me-2" placeholder="Type your message here...">
                    <button class="btn btn-primary" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>

        <div id="right-panel" style="background-color: #f2f2f2; color: black; width: 20vw; right:0; top:0;" class="h-100 position-absolute">
            <div class="p-2">
                <div id="right-pannel"></div>
            </div>
        </div>

    </div>

    <script>
        function drawTextAtCenterOfMessageList() {
            const messageList = document.getElementById('message-list');
            const messageHolderElement = document.createElement('div');
            messageHolderElement.classList.add('d-flex');
            messageHolderElement.classList.add('justify-content-center');
            const messageElement = document.createElement('div');
            messageElement.classList.add('mb-2');
            messageElement.classList.add('border');
            messageElement.classList.add('rounded');
            messageElement.classList.add('p-2');
            messageElement.innerHTML = `
            <strong>
                Welcome to AI - Chat!
            </strong>
            <br>
            <br>
            Here are some commands you can try:
            <br>
            <br>
            <ul>
                <li>
                    <button onclick="sendMessageToChatWithOthers()">
                        Chat with others
                    </button>
                </li>
            </ul>`;
            messageHolderElement.appendChild(messageElement);
            messageList.appendChild(messageHolderElement);
        }
        function clearCenterArea() {
            const messageList = document.getElementById('message-list');
            messageList.innerHTML = '';
        }
        function sendMessageToChatWithOthers() {
            clearCenterArea();
            addMessage('You', 'I would like to chat with Carolina and Lara');
            setTimeout(() => {
                showMatchingNames();
            }, 700);
        }
        function showMatchingNames() {
            setTimeout(() => {
                addMessage('AI', 'I found some matches. Select the contacts you want to chat with:', false);
                setTimeout(() => {
                    addMessage('AI', `<div class="d-flex flex-column gap-2">
                            <button onclick="userSelectedForChat('Carolina Summers')">
                                Carolina Summers
                            </button>
                            <button onclick="userSelectedForChat('Carolina Gulberti')">
                                Carolina Gulberti
                            </button>
                            <button onclick="userSelectedForChat('Lara Rodriguez')">
                                Lara Rodriguez
                            </button>
                            <hr class="m-0" />
                            <button onclick="startChattingWithSelectedNames()">
                                Start chatting!
                            </button>
                        </div>
                    `, false);
                }, 700);
            }, 700);
        }
        function userSelectedForChat(name) {
            addMessage('You', `I want to chat with ${name}`, false);
        }
        function startChattingWithSelectedNames() {
            addMessage('AI', 'Connecting you with Carolina Gulberti and Lara Rodriguez...', false);
            setTimeout(() => {
                clearCenterArea();
                createGroupInLeftPannel();
                setTimeout(() => {
                    addMessage('AI', 'You are ready to chat now!', false);
                    setTimeout(() => {
                        typeAutomatically('Hi ladies! We need to do that trip to Portugal!', false);
                    })
                }, 700);
            }, 1000);
        }
        function typeAutomatically(text) {
            const input = document.querySelector('#input-panel input');
            let index = 0;
            const interval = setInterval(() => {
                if (index < text.length) {
                    input.value += text[index];
                    index++;
                } else {
                    clearInterval(interval);
                    sendMessage();
                }
            }, 100);
        }
        function createGroupInLeftPannel() {
            const leftPannel = document.getElementById('left-pannel');
            const groupElement = document.createElement('div');
            groupElement.classList.add('mb-2');
            groupElement.classList.add('border');
            groupElement.classList.add('rounded');
            groupElement.classList.add('p-2');
            groupElement.innerHTML = `<strong>Group Chat</strong><br>Carolina Gulberti, Lara Rodriguez`;
            leftPannel.appendChild(groupElement);
        }
        function sendMessage() {
            const input = document.querySelector('#input-panel input');
            const message = input.value.trim();
            if (message) {
                addMessage('You', message);
                input.value = '';
            }
        }
        function addMessage(from, message, analise = true) {
            const messageList = document.getElementById('message-list');
            const messageHolderElement = document.createElement('div');
            messageHolderElement.classList.add('d-flex');
            const messageElement = document.createElement('div');
            messageElement.classList.add('mb-2');
            messageElement.classList.add('border');
            messageElement.classList.add('rounded');
            messageElement.classList.add('p-2');
            messageElement.innerHTML = `<strong>${from}:</strong> ${message}`;
            messageHolderElement.appendChild(messageElement);
            messageList.appendChild(messageHolderElement);
            if (analise) {
                analiseMessageSent(from, message);
            }
        }
        function analiseMessageSent(from, message) {
            setTimeout(() => {
                if (message.toLowerCase().includes('carolina') && message.toLowerCase().includes('lara')) {
                    addMessage('AI', 'Connecting you with Carolina and Lara...', false);
                } else if (message.toLowerCase().includes('trip') && message.toLowerCase().includes('portugal')) {
                    showPlaneDatesOnTheRightPanel();
                } else {
                    addMessage('AI', 'Sorry, I did not understand that command. Please try again.', false);
                }
            }, 500)
        }
        function showPlaneDatesOnTheRightPanel() {
            setTimeout(() => {
                const rightPannel = document.getElementById('right-pannel');
                const datesElement = document.createElement('div');
                datesElement.classList.add('mb-2');
                datesElement.classList.add('border');
                datesElement.classList.add('rounded');
                datesElement.classList.add('p-2');
                datesElement.innerHTML = `<div>
                    <div class="p-2"><b>Flights Found to Portugal</b></div>
                    <div class="mt-3 border rounded p-2">
                        <div class="mb-2">
                            TAP Air Portugal
                        </div>
                        <div class="mb-2">
                            <button onclick="">
                                <b>Flight 1:</b> 20th July 2024 - $500
                            </button>
                        </div>
                        <div class="mb-2">
                            <button onclick="">
                                Flight 2:</b> 22nd July 2024 - $450
                            </button>
                        </div>
                        <div class="mb-2">
                            <button onclick="">
                                <b>Flight 3:</b> 25th July 2024 - $550
                            </button>
                        </div>
                        <div class="mb-2">
                            Portugal Airline
                        </div>
                        <div class="mb-2">
                            <button onclick="">
                                <b>Flight 1:</b> 20th July 2024 - $500
                            </button>
                        </div>
                        <div class="mb-2">
                            <button onclick="">
                                Flight 2:</b> 22nd July 2024 - $450
                            </button>
                        </div>
                        <div class="mb-2">
                            <button onclick="">
                                <b>Flight 3:</b> 25th July 2024 - $550
                            </button>
                        </div>
                    </div>
                </div>`;
                rightPannel.appendChild(datesElement);
            }, 700);
        }

        drawTextAtCenterOfMessageList();

    </script>

</body>
</html>
